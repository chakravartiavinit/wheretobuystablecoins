<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow circle -->
  <circle cx="600" cy="280" r="300" fill="#6366f1" fill-opacity="0.08"/>

  <!-- Accent bar -->
  <rect x="100" y="200" width="120" height="6" rx="3" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="100" y="290" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Where to Buy</text>
  <text x="100" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" fill="url(#accent)" letter-spacing="-2">Stablecoins</text>

  <!-- Subtitle -->
  <text x="100" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0">Compare rates. Find the cheapest on-ramp for USDT, USDC &amp; more.</text>

  <!-- Feature pills -->
  <rect x="100" y="490" width="200" height="52" rx="26" fill="#ffffff" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="200" y="522" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">💰 Compare Rates</text>

  <rect x="320" y="490" width="200" height="52" rx="26" fill="#ffffff" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="420" y="522" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">⚡ Fastest Routes</text>

  <rect x="540" y="490" width="220" height="52" rx="26" fill="#ffffff" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="650" y="522" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">🌍 Local Currency</text>

  <!-- Domain watermark -->
  <text x="1100" y="590" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#475569" text-anchor="end">wheretobuystablecoins.com</text>
</svg>
